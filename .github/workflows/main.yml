name: Scorecard supply-chain security

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v3

      - name: "Run Scorecard analysis"
        uses: ossf/scorecard-action@v2.3.1
